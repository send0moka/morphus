<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root {
      color-scheme: dark;
      --bg: #0f1012;
      --bg-top: #202021;
      --bg-gradient: linear-gradient(to top right, #0f1012 0%, #202021 100%);
      --file-button-bg: linear-gradient(to top, #282828 0%, #313132 100%);
      --file-button-bg-hover: linear-gradient(to top, #303032 0%, #3a3a3b 100%);
      --panel: linear-gradient(to top, #141516 0%, #19191a 100%);
      --field: #101012;
      --ink: #f4f4f4;
      --muted: #a8a8a8;
      --line: #2a2a2a;
      --line-strong: #3d3d3d;
      --selected: #333333;
      --surface-hover: #111111;
      --accent: #f70f0f;
      --accent-strong: #c90c0c;
      --on-accent: #ffffff;
      --status-danger: #f70f0f;
      --status-success: #d6d6d6;
      --shadow: rgba(0, 0, 0, 0.35);
      --chip-bg: #151618;
      --chip-border: #323335;
      --chip-active-bg: linear-gradient(to top, #321e1e 0%, #412b2b 100%) padding-box, linear-gradient(to top, #de514a 0%, #d15e58 100%) border-box;
      --chip-active-text: #ffffff;
      --logo-bg: #1e1f21;
      --logo-border: #383839;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f4f4;
      --bg-top: #ffffff;
      --bg-gradient: linear-gradient(to top right, var(--bg) 0%, var(--bg-top) 100%);
      --file-button-bg: linear-gradient(to top, #ececec 0%, #ffffff 100%);
      --file-button-bg-hover: linear-gradient(to top, #dedede 0%, #f4f4f4 100%);
      --panel: #ffffff;
      --field: #fafafa;
      --ink: #0a0a0a;
      --muted: #5d5d5d;
      --line: #d8d8d8;
      --line-strong: #bcbcbc;
      --selected: #ececec;
      --surface-hover: #f1f1f1;
      --accent: #f70f0f;
      --accent-strong: #d80d0d;
      --on-accent: #ffffff;
      --status-danger: #d80d0d;
      --status-success: #242424;
      --shadow: rgba(0, 0, 0, 0.08);
      --chip-bg: #ffffff;
      --chip-border: #d8d8d8;
      --chip-active-bg: linear-gradient(to top, #fef2f2 0%, #ffffff 100%) padding-box, linear-gradient(to top, #f70f0f 0%, #d80d0d 100%) border-box;
      --chip-active-text: #d80d0d;
      --logo-bg: #ffffff;
      --logo-border: #d8d8d8;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1012;
      --bg-top: #202021;
      --bg-gradient: linear-gradient(to top right, #0f1012 0%, #202021 100%);
      --file-button-bg: linear-gradient(to top, #282828 0%, #313132 100%);
      --file-button-bg-hover: linear-gradient(to top, #303032 0%, #3a3a3b 100%);
      --panel: linear-gradient(to top, #141516 0%, #19191a 100%);
      --field: #101012;
      --ink: #f4f4f4;
      --muted: #a8a8a8;
      --line: #2a2a2a;
      --line-strong: #3d3d3d;
      --selected: #333333;
      --surface-hover: #111111;
      --accent: #f70f0f;
      --accent-strong: #c90c0c;
      --on-accent: #ffffff;
      --status-danger: #f70f0f;
      --status-success: #d6d6d6;
      --shadow: rgba(0, 0, 0, 0.35);
      --chip-bg: #151618;
      --chip-border: #323335;
      --chip-active-bg: linear-gradient(to top, #321e1e 0%, #412b2b 100%) padding-box, linear-gradient(to top, #de514a 0%, #d15e58 100%) border-box;
      --chip-active-text: #ffffff;
      --logo-bg: #1e1f21;
      --logo-border: #383839;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', Inter, system-ui, sans-serif;
      font-size: 13px;
      color: var(--ink);
      background: var(--bg-gradient);
      padding: 8px 10px 0;
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      display: grid;
      gap: 5px;
    }

    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .brand {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--logo-bg);
      border: 1px solid var(--logo-border);
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      font-weight: 800;
    }

    .brand-logo span {
      background: linear-gradient(to top, #f73f3c 0%, #fd6a68 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1.5px;
      padding-right: 2px;
    }

    .brand-text {
      min-width: 0;
      flex: 1;
    }

    
    .brand h2 {
      font-size: 14px;
      line-height: 1.2;
      margin-bottom: 2px;
      letter-spacing: 0;
      color: var(--ink);
    }

    .brand p {
      color: var(--muted);
      line-height: 1.25;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--file-button-bg);
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--line-strong);
      background: var(--file-button-bg-hover);
      color: var(--ink);
    }

    .icon-btn svg {
      flex-shrink: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
      display: grid;
      gap: 6px;
      position: relative;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .field > label,
    .field-title,
    .viewport-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input[type="text"],
    .field input[type="number"],
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      color: var(--ink);
      padding: 7px 9px;
      appearance: none;
      -webkit-appearance: none;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .file-control {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      transition: border-color 0.15s, background 0.15s;
    }

    .file-control:focus-within {
      border-color: var(--accent);
    }

    .file-picker {
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--file-button-bg);
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .file-picker:hover,
    .file-picker:focus-visible {
      border-color: var(--line-strong);
      background: var(--file-button-bg-hover);
      outline: none;
    }

    .file-picker svg {
      flex-shrink: 0;
    }

    .editor-wrapper {
      display: flex;
      height: 160px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s;
    }

    .editor-wrapper:focus-within {
      border-color: var(--accent);
    }

    .editor-line-numbers {
      padding: 8px 6px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.45;
      text-align: right;
      user-select: none;
      overflow: hidden;
      min-width: 36px;
    }

    .editor-content {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--field);
    }

    .editor-content textarea,
    .editor-content pre {
      margin: 0;
      padding: 8px 10px;
      border: none;
      width: 100%;
      height: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.45;
      white-space: pre;
      overflow: auto;
      tab-size: 2;
      background: transparent;
      box-sizing: border-box;
    }

    .editor-content textarea {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      color: transparent;
      caret-color: var(--ink);
      outline: none;
      resize: none;
    }

    .editor-content pre {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      color: var(--ink);
      pointer-events: none;
    }

    .hl-tag { color: #f07178; }
    .hl-attr { color: #ffcb6b; }
    .hl-string { color: #c3e88d; }
    .hl-comment { color: #676e95; font-style: italic; }
    .hl-keyword { color: #c792ea; }
    .hl-css-prop { color: #82aaff; }
    .hl-css-val { color: #f78c6c; }
    .hl-css-sel { color: #ffcb6b; }

    [data-theme="light"] .hl-tag { color: #e53935; }
    [data-theme="light"] .hl-attr { color: #f6a434; }
    [data-theme="light"] .hl-string { color: #43a047; }
    [data-theme="light"] .hl-comment { color: #a0a1a7; }

    .file-meta {
      flex: 1;
      min-width: 0;
      font-size: 11px;
      line-height: 1.2;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewport-block {
      display: grid;
      gap: 6px;
    }

    .preset-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      height: 26px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .chip:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      color: var(--ink);
    }

    .chip.active {
      background: var(--chip-active-bg);
      border: 1.5px solid transparent;
      color: var(--chip-active-text);
      box-shadow: none;
    }

    .chip svg {
      flex-shrink: 0;
    }

    .width-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: end;
    }

    .width-row label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .primary {
      width: 100%;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(to top, #bd0e16 0%, #dd242a 100%) padding-box,
                  linear-gradient(to top, #ea0c12 0%, #f15457 100%) border-box;
      border: 1.5px solid transparent;
      color: var(--on-accent);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .primary:hover {
      background: linear-gradient(to top, #ab0d14 0%, #c82025 100%) padding-box,
                  linear-gradient(to top, #d40a10 0%, #df4c4f 100%) border-box;
      color: var(--on-accent);
    }

    .primary:disabled {
      opacity: 0.7;
      cursor: progress;
    }

    .progress {
      height: 5px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > div {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.2s linear;
    }

    #status {
      height: 15px;
      font-size: 12px;
      line-height: 1.25;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    #status.error {
      color: var(--status-danger);
    }

    #status.success {
      color: var(--status-success);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top-bar">
      <div class="brand">
        <div class="brand-logo"><span>&lt;/&gt;</span></div>
        <div class="brand-text">
          <h2>Morphus</h2>
          <p>Paste HTML, build in Figma.</p>
        </div>
      </div>
      <div class="actions">
        <button id="benchmarkBtn" class="icon-btn" type="button" title="Open benchmark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3h7v7" />
            <path d="M10 14 21 3" />
            <path d="M21 14v7h-7" />
            <path d="M3 10V3h7" />
            <path d="M3 21l7-7" />
          </svg>
          Benchmark
        </button>
        <button id="themeBtn" class="icon-btn" type="button" title="Toggle theme">
          <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
          <span id="themeLabel">System</span>
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <div class="field-title">HTML file</div>
        <div class="file-control">
          <button id="filePickerBtn" class="file-picker" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <path d="M14 2v6h6" />
              <path d="M12 18v-6" />
              <path d="m9 15 3 3 3-3" />
            </svg>
            <span>Choose File</span>
          </button>
          <input id="fileInput" class="file-input" type="file" accept=".html,.htm,text/html" />
          <div id="fileMeta" class="file-meta">No file selected.</div>
        </div>
      </div>

      <div class="field">
        <label for="htmlInput">HTML input</label>
        <div class="editor-wrapper">
          <div class="editor-line-numbers" id="lineNumbers"></div>
          <div class="editor-content">
            <textarea id="htmlInput" wrap="off" placeholder="Paste raw HTML here..." spellcheck="false"></textarea>
            <pre aria-hidden="true"><code id="highlightCode"></code></pre>
          </div>
        </div>
      </div>

      <div class="viewport-block">
        <div class="viewport-head">
          <span>Viewport</span>
        </div>
        <div class="preset-chips">
          <button type="button" class="chip active" data-preset="desktop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Desktop
          </button>
          <button type="button" class="chip" data-preset="tablet">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
            Tablet
          </button>
          <button type="button" class="chip" data-preset="mobile">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
            Mobile
          </button>
          <button type="button" class="chip" id="allViewportsBtn">
            All
          </button>
        </div>
        <div class="width-row">
          <div class="field">
            <label id="widthLabel" for="widthInput">Desktop width</label>
            <input id="widthInput" type="number" min="320" step="1" value="1440" />
          </div>
        </div>
      </div>

      <button id="buildBtn" class="primary" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        Convert &amp; Build
      </button>
      <div class="progress"><div id="progressFill"></div></div>
    </div>

    <div id="status" aria-live="polite"></div>
  </div>

  <script>
    const BENCHMARK_URL = 'https://figmaeval.vercel.app';
    const PRESETS = {
      desktop: { width: 1440, height: 900 },
      tablet: { width: 768, height: 1024 },
      mobile: { width: 375, height: 812 },
    };
    const THEMES = ['system', 'dark', 'light'];
    const THEME_ICONS = {
      system: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>',
      dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
      light: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
    };
    const THEME_LABELS = { system: 'System', dark: 'Dark', light: 'Light' };

    const filePickerBtn = document.getElementById('filePickerBtn');
    const fileInput = document.getElementById('fileInput');
    const htmlInput = document.getElementById('htmlInput');
    const highlightCode = document.getElementById('highlightCode');
    const lineNumbers = document.getElementById('lineNumbers');
    const widthInput = document.getElementById('widthInput');
    const widthLabel = document.getElementById('widthLabel');
    const buildBtn = document.getElementById('buildBtn');
    const progressFill = document.getElementById('progressFill');
    const statusEl = document.getElementById('status');
    const fileMeta = document.getElementById('fileMeta');
    const benchmarkBtn = document.getElementById('benchmarkBtn');
    const allViewportsBtn = document.getElementById('allViewportsBtn');
    const themeBtn = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const htmlEl = document.documentElement;
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)');
    const chips = document.querySelectorAll('.chip[data-preset]');
    const PRESET_ORDER = ['desktop', 'tablet', 'mobile'];
    const PRESET_LABELS = { desktop: 'Desktop', tablet: 'Tablet', mobile: 'Mobile' };

    const store = {
      _mem: {},
      get(key) {
        try {
          return localStorage.getItem(key);
        } catch (error) {
          return this._mem[key] || null;
        }
      },
      set(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (error) {
          this._mem[key] = value;
        }
      },
    };

    const state = {
      currentTheme: store.get('morphus-theme') || 'dark',
      currentPreset: 'desktop',
      selectedPresets: ['desktop'],
      viewportWidths: {
        desktop: PRESETS.desktop.width,
        tablet: PRESETS.tablet.width,
        mobile: PRESETS.mobile.width,
      },
      selectedFile: null,
    };

    benchmarkBtn.addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: { type: 'OPEN_BENCHMARK' },
      }, '*');
    });

    filePickerBtn.addEventListener('click', () => {
      fileInput.click();
    });

    themeBtn.addEventListener('click', () => {
      const index = THEMES.indexOf(state.currentTheme);
      applyTheme(THEMES[(index + 1) % THEMES.length]);
    });

    sysDark.addEventListener('change', () => {
      if (state.currentTheme === 'system') {
        applyTheme('system');
      }
    });

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        const presetName = chip.dataset.preset;
        const preset = PRESETS[presetName];
        if (!preset) {
          return;
        }
        state.currentPreset = presetName;
        togglePresetSelection(presetName);
        renderViewportControls();
        setStatus('');
      });
    });

    allViewportsBtn.addEventListener('click', () => {
      if (state.selectedPresets.length === PRESET_ORDER.length) {
        state.selectedPresets = ['desktop'];
        state.currentPreset = 'desktop';
      } else {
        state.selectedPresets = [...PRESET_ORDER];
        if (!state.selectedPresets.includes(state.currentPreset)) {
          state.currentPreset = 'desktop';
        }
      }
      renderViewportControls();
      setStatus('');
    });

    htmlInput.addEventListener('scroll', () => {
      highlightCode.parentElement.scrollTop = htmlInput.scrollTop;
      highlightCode.parentElement.scrollLeft = htmlInput.scrollLeft;
      lineNumbers.scrollTop = htmlInput.scrollTop;
    });

    htmlInput.addEventListener('input', () => {
      updateEditor();
    });

    function updateEditor() {
      const code = htmlInput.value;
      let text = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      text = text.replace(/(&lt;style[\s\S]*?&gt;)([\s\S]*?)(&lt;\/style&gt;)/gi, (match, open, content, close) => {
        let css = content;
        css = css.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-comment">$1</span>');
        css = css.replace(/([a-zA-Z\-]+)(?=\s*:)/g, '<span class="hl-css-prop">$1</span>');
        css = css.replace(/\b(\d+(?:px|em|rem|%|vh|vw|ms|s)?)\b/g, '<span class="hl-css-val">$1</span>');
        css = css.replace(/([.#][a-zA-Z0-9\-_]+)/g, '<span class="hl-css-sel">$1</span>');
        return open + css + close;
      });

      text = text.replace(/(&lt;script[\s\S]*?&gt;)([\s\S]*?)(&lt;\/script&gt;)/gi, (match, open, content, close) => {
        let js = content;
        js = js.replace(/(\/\*[\s\S]*?\*\/|\/\/.*)/g, '<span class="hl-comment">$1</span>');
        js = js.replace(/('[^']*'|"[^"]*"|`[^`]*`)/g, '<span class="hl-string">$1</span>');
        const keywords = 'function const let var return if else for while do switch case break continue new class extends import export default true false null undefined await async document window console';
        js = js.replace(new RegExp('\\b(' + keywords.split(' ').join('|') + ')\\b', 'g'), '<span class="hl-keyword">$1</span>');
        return open + js + close;
      });

      text = text.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="hl-comment">$1</span>');
      text = text.replace(/(&lt;\/?[a-zA-Z0-9\-]+)([\s\S]*?)(&gt;)/g, (match, p1, p2, p3) => {
        let tagHtml = p1.replace(/(&lt;\/?)([a-zA-Z0-9\-]+)/, '$1<span class="hl-tag">$2</span>');
        let attrHtml = p2.replace(/([a-zA-Z0-9\-:]+)(\s*=\s*("[^"]*"|'[^']*'))?/g, (match, attrName, eqAndValue, quoteValue) => {
          let res = '<span class="hl-attr">' + attrName + '</span>';
          if (eqAndValue) {
            res += eqAndValue.replace(quoteValue, '<span class="hl-string">' + quoteValue + '</span>');
          }
          return res;
        });
        return tagHtml + attrHtml + p3;
      });
      
      highlightCode.innerHTML = text + (code[code.length - 1] === '\n' ? ' ' : '');

      const linesCount = code.split('\n').length || 1;
      let numbersHtml = '';
      for (let i = 1; i <= linesCount; i++) {
        numbersHtml += i + '<br>';
      }
      lineNumbers.innerHTML = numbersHtml;
    }

    widthInput.addEventListener('input', () => {
      const width = normalizeDimension(widthInput.value, PRESETS[state.currentPreset].width);
      state.viewportWidths[state.currentPreset] = width;
    });

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        state.selectedFile = null;
        fileMeta.textContent = 'No file selected.';
        return;
      }

      if (!isHtmlFile(file)) {
        state.selectedFile = null;
        fileInput.value = '';
        fileMeta.textContent = 'No file selected.';
        setStatus('Select a .html file.', 'error');
        return;
      }

      try {
        const text = await file.text();
        if (!looksLikeHtml(text)) {
          throw new Error('The file does not look like HTML.');
        }

        state.selectedFile = file;
        htmlInput.value = text;
        updateEditor();
        fileMeta.textContent = file.name;
        setStatus(`Loaded ${file.name}.`, 'success');
      } catch (error) {
        state.selectedFile = null;
        fileInput.value = '';
        fileMeta.textContent = 'No file selected.';
        setStatus(error.message || 'Unable to read file.', 'error');
      }
    });

    buildBtn.addEventListener('click', () => {
      const html = htmlInput.value.trim();
      if (!html) {
        setStatus('Paste HTML or choose a file first.', 'error');
        return;
      }

      if (!looksLikeHtml(html)) {
        setStatus('The input does not look like HTML.', 'error');
        return;
      }

      state.viewportWidths[state.currentPreset] = normalizeDimension(widthInput.value, PRESETS[state.currentPreset].width);
      const viewports = getSelectedViewports();
      if (viewports.length === 0) {
        setStatus('Select at least one viewport.', 'error');
        return;
      }

      const payload = {
        html,
        sourceName: state.selectedFile ? state.selectedFile.name : 'inline.html',
        viewport: viewports[0],
        viewports,
      };

      buildBtn.disabled = true;
      progressFill.style.width = '0%';
      setStatus('Sending HTML to the converter...');

      parent.postMessage({
        pluginMessage: {
          type: 'CONVERT_AND_BUILD',
          payload,
        },
      }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) {
        return;
      }

      if (msg.type === 'PROGRESS') {
        if (typeof msg.percent === 'number') {
          progressFill.style.width = `${msg.percent}%`;
        }
        setStatus(msg.text || 'Working...');
      }

      if (msg.type === 'DONE') {
        progressFill.style.width = '100%';
        const styleCount = msg.styles ? (Number(msg.styles.paint || 0) + Number(msg.styles.text || 0)) : 0;
        const styleText = styleCount > 0 ? ` and ${styleCount} local styles` : '';
        const viewportText = msg.variants && msg.variants > 1 ? ` across ${msg.variants} viewports` : '';
        setStatus(`Done. Created ${msg.nodeCount} nodes${viewportText}${styleText}.`, 'success');
        buildBtn.disabled = false;
      }

      if (msg.type === 'ERROR') {
        setStatus(msg.message || 'Something went wrong.', 'error');
        buildBtn.disabled = false;
      }
    };

    applyTheme(state.currentTheme);
    renderViewportControls();
    fileMeta.textContent = 'No file selected.';
    updateEditor();

    function applyTheme(theme) {
      state.currentTheme = theme;
      store.set('morphus-theme', theme);
      const isDark = theme === 'dark' || (theme === 'system' && sysDark.matches);
      htmlEl.setAttribute('data-theme', isDark ? 'dark' : 'light');
      themeIcon.innerHTML = THEME_ICONS[theme];
      themeLabel.textContent = THEME_LABELS[theme];
    }

    function setStatus(message, type = '') {
      statusEl.className = type;
      statusEl.textContent = message || '';
    }

    function normalizeDimension(value, fallback) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number >= 320 ? number : fallback;
    }

    function togglePresetSelection(presetName) {
      const selected = state.selectedPresets.includes(presetName);
      if (selected && state.selectedPresets.length > 1) {
        state.selectedPresets = state.selectedPresets.filter((item) => item !== presetName);
        if (!state.selectedPresets.includes(state.currentPreset)) {
          state.currentPreset = state.selectedPresets[0] || 'desktop';
        }
        return;
      }

      if (!selected) {
        state.selectedPresets = state.selectedPresets.concat(presetName);
      }
    }

    function renderViewportControls() {
      const selectedSet = new Set(state.selectedPresets);
      chips.forEach((chip) => {
        chip.classList.toggle('active', selectedSet.has(chip.dataset.preset));
      });
      allViewportsBtn.classList.toggle('active', state.selectedPresets.length === PRESET_ORDER.length);

      if (!PRESETS[state.currentPreset]) {
        state.currentPreset = state.selectedPresets[0] || 'desktop';
      }
      widthInput.value = state.viewportWidths[state.currentPreset] || PRESETS[state.currentPreset].width;
      widthLabel.textContent = `${PRESET_LABELS[state.currentPreset]} width`;
      const svgIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>';
      buildBtn.innerHTML = state.selectedPresets.length > 1
        ? `${svgIcon} Convert &amp; Build (${state.selectedPresets.length})`
        : `${svgIcon} Convert &amp; Build`;
    }

    function getSelectedViewports() {
      return PRESET_ORDER
        .filter((presetName) => state.selectedPresets.includes(presetName))
        .map((presetName) => ({
          name: presetName,
          label: PRESET_LABELS[presetName],
          width: normalizeDimension(state.viewportWidths[presetName], PRESETS[presetName].width),
          height: PRESETS[presetName].height,
        }));
    }

    function isHtmlFile(file) {
      const name = String(file && file.name ? file.name : '').toLowerCase();
      const type = String(file && file.type ? file.type : '').toLowerCase();
      const hasHtmlExtension = /\.(html?|htm)$/i.test(name);
      const allowedType = !type || type === 'text/html' || type === 'application/xhtml+xml' || type === 'application/octet-stream';
      return hasHtmlExtension && allowedType && !type.startsWith('image/');
    }

    function looksLikeHtml(value) {
      const text = String(value || '').trim();
      if (!text) {
        return false;
      }

      return /^<!doctype\s+html/i.test(text)
        || /<html[\s>]/i.test(text)
        || /<\/?[a-z][\s\S]*>/i.test(text);
    }
  </script>
</body>
