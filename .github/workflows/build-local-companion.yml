name: Build Local Companion

on:
  workflow_dispatch:
  push:
    tags:
      - 'local-companion-v*'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            artifact: morphus-local-macos-arm64
          - name: Windows x64
            runner: windows-latest
            artifact: morphus-local-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build local companion package
        run: npm run local-app:build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/local-app/*.zip
          if-no-files-found: error
