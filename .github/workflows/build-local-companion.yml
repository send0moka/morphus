name: Build Morphus Packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish GitHub Release with versioned Morphus assets'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'Release version, for example 0.1.1. Required when publish_release is true.'
        required: false
        type: string
  push:
    tags:
      - 'morphus-v*'
      - 'local-companion-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            artifact: morphus-converter-macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            artifact: morphus-converter-macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Morphus Converter package
        run: npm run converter:build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/local-app/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows x64
    runs-on: windows-2025
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Morphus Converter package
        run: npm run converter:build

      - name: Upload package
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: morphus-converter-windows-x64
          path: out/local-app/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    if: always() && needs.build-macos.result == 'success' && ((startsWith(github.ref, 'refs/tags/morphus-v') || startsWith(github.ref, 'refs/tags/local-companion-v')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release))
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/morphus-v* ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#morphus-v}"
          elif [[ "$GITHUB_REF" == refs/tags/local-companion-v* ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#local-companion-v}"
          else
            version="${{ inputs.release_version }}"
            if [[ -z "$version" ]]; then
              echo "release_version is required when publish_release is true." >&2
              exit 1
            fi
            tag="morphus-v${version}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets out/homebrew/Casks
          find downloaded-artifacts \( -name '*.zip' -o -name '*.dmg' \) -exec cp {} release-assets/ \;
          version="${{ steps.release_meta.outputs.version }}"
          tag="${{ steps.release_meta.outputs.tag }}"
          shopt -s nullglob
          for file in release-assets/*.{zip,dmg}; do
            ext="${file##*.}"
            base_name="$(basename "$file" ".$ext")"
            clean_base="$(echo "$base_name" | tr ' ' '.')"
            versioned_name="${clean_base}.v${version}.${ext}"
            mv "$file" "release-assets/$versioned_name"
          done
          mkdir -p figma-plugin-package
          cp figma-plugin/manifest.json figma-plugin/code.js figma-plugin/ui.html figma-plugin-package/
          (cd figma-plugin-package && zip -r ../release-assets/Morphus.Figma.Plugin.v${version}.zip .)
          arm_dmg="$(find release-assets -name 'Morphus.Converter.macOS.arm64.v*.dmg' | head -n 1)"
          intel_dmg="$(find release-assets -name 'Morphus.Converter.macOS.x64.v*.dmg' | head -n 1)"
          node scripts/generate-homebrew-cask.js \
            --version "$version" \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --arm-dmg "$arm_dmg" \
            --intel-dmg "$intel_dmg" \
            --release-name-style dotted-versioned \
            --output release-assets/morphus-converter.v${version}.rb
          ls -lh release-assets

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          version="${{ steps.release_meta.outputs.version }}"
          gh release create "$tag" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Morphus Figma Plugin and Morphus Converter $version"
