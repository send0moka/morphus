name: Build Local Companion

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish GitHub Release for Homebrew latest/download URLs'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'Release version, for example 0.1.0. Required when publish_release is true.'
        required: false
        type: string
  push:
    tags:
      - 'local-companion-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            artifact: morphus-local-macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            artifact: morphus-local-macos-x64
          - name: Windows x64
            runner: windows-latest
            artifact: morphus-local-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build local companion package
        run: npm run local-app:build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/local-app/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/local-companion-v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/local-companion-v* ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#local-companion-v}"
          else
            version="${{ inputs.release_version }}"
            if [[ -z "$version" ]]; then
              echo "release_version is required when publish_release is true." >&2
              exit 1
            fi
            tag="local-companion-v${version}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets out/homebrew/Casks
          find downloaded-artifacts -name '*.zip' -exec cp {} release-assets/ \;
          version="${{ steps.release_meta.outputs.version }}"
          tag="${{ steps.release_meta.outputs.tag }}"
          arm_zip="$(find release-assets -name 'Morphus Local macOS arm64.zip' | head -n 1)"
          intel_zip="$(find release-assets -name 'Morphus Local macOS x64.zip' | head -n 1)"
          node scripts/generate-homebrew-cask.js \
            --version "$version" \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --arm-zip "$arm_zip" \
            --intel-zip "$intel_zip" \
            --output release-assets/morphus-local.rb
          ls -lh release-assets

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          version="${{ steps.release_meta.outputs.version }}"
          gh release create "$tag" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Morphus Local Companion $version"
